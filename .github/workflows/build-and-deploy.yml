name: Build & Deploy openclaw-image

on:
  push:
    branches:
      - main
      - 'artie/**'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Get image version
        id: version
        run: |
          VERSION=$(echo "${{ steps.meta.outputs.tags }}" | head -1 | cut -d':' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  deploy-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
    
    steps:
      - name: Trigger GitOps workflow from tuyauterie
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: 'tuyauterie',
              workflow_id: '.github/workflows/deployment-gitops.yml',
              ref: 'main',
              inputs: {
                version: version,
                repository: 'notarock/gitops',
                deployment-path: 'openclaw-operator/resources/arteix4090.yaml',
                base-image-pattern: 'ghcr.io/notarock/openclaw-image'
              },
              secrets: {
                gitops-token: process.env.GITOPS_TOKEN
              }
            });
