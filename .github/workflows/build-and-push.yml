name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.GITOPS_TOKEN }}
          repository: notarock/gitops

      - name: Update image tag
        run: |
          set -x
          sed -i -E 's|(tag: )"[^"]*"|\1"${{ needs.build-and-push.outputs.version }}"|' openclaw-operator/resources/arteix4090.yaml
          sed -i -E 's|(tag: )"[^"]*"|\1"${{ needs.build-and-push.outputs.version }}"|' openclaw-operator/resources/arteix-discord.yaml
          git diff --unified=0

      - name: Commit & Push changes
        uses: actions-js/push@master
        with:
          coauthor_name: ${{ github.actor }}
          github_token: ${{ secrets.GITOPS_TOKEN }}
          repository: notarock/gitops
          message: "chore: autopublish openclaw-operator/resources/arteix4090.yaml and arteix-discord.yaml ${{ needs.build-and-push.outputs.version }}"
